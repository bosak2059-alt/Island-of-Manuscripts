<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель | Остров Рукописей</title>
    <link rel="stylesheet" href="/frontend/css/style.css">
</head>
<body class="admin-body">
    <header class="admin-header">
        <nav class="admin-nav">
            <h1 class="admin-title">👑 Админ-панель</h1>
            <div class="admin-links">
                <a href="/" class="btn-link">🌐 На сайт</a>
                <a href="/api/logout" class="btn-link btn-logout" onclick="event.preventDefault(); fetch('/api/logout', {method:'POST'}).then(()=>location.href='/')">🚪 Выход</a>
            </div>
        </nav>
    </header>

    <main class="admin-main">
        <h2 style="color: var(--gold); margin-bottom: 25px; font-size: 1.8rem;">📋 Все рукописи</h2>
        
        <div class="table-responsive">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Автор</th>
                        <th>Email</th>
                        <th>Название</th>
                        <th>Жанр</th>
                        <th>Статус</th>
                        <th>Файл</th>
                        <th>Ссылка</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="submissions-table">
                    <tr class="loading-row"><td colspan="8">Загрузка данных...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        fetch('/api/admin/all-submissions')
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('submissions-table');
                tbody.innerHTML = '';
                
                if (!data || data.length === 0) {
                    tbody.innerHTML = '<tr class="empty-row"><td colspan="8">Рукописей пока нет</td></tr>';
                    return;
                }

                data.forEach(sub => {
                    // Статус
                    const statusClass = `status-${sub.status}`;
                    const statusText = sub.status === 'Submitted' ? 'На рассмотрении' : 
                                       sub.status === 'Approved' ? 'Одобрено' : 'Отклонено';

                    // Колонка "Файл"
                    const fileCell = sub.filename 
                        ? `<a href="/api/admin/download/${encodeURIComponent(sub.filename)}" class="btn-download" target="_blank">📥 Скачать</a>`
                        : `<span class="no-file">—</span>`;

                    // Колонка "Ссылка" (текст из формы)
                    const linkCell = sub.text_link 
                        ? `<a href="${sub.text_link}" target="_blank" rel="noopener noreferrer">🔗 Открыть ↗</a>`
                        : `<span class="no-link">—</span>`;

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><strong>${sub.author_name || sub.username || '—'}</strong></td>
                        <td><a href="mailto:${sub.email || sub.user_email || ''}" style="color:var(--text-secondary)">${sub.email || sub.user_email || '—'}</a></td>
                        <td>${sub.manuscript_title || '—'}</td>
                        <td>${sub.genre || '—'}</td>
                        <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                        <td class="file-cell">${fileCell}</td>
                        <td class="link-cell">${linkCell}</td>
                        <td class="actions-cell">
                            <button class="btn-action btn-approve" onclick="updateStatus('${sub.id}', 'Approved')" title="Одобрить">✅ Одобрить</button>
                            <button class="btn-action btn-reject" onclick="updateStatus('${sub.id}', 'Rejected')" title="Отклонить">❌ Отклонить</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            })
            .catch(err => {
                console.error('Ошибка загрузки:', err);
                document.getElementById('submissions-table').innerHTML = 
                    '<tr class="empty-row"><td colspan="8" style="color:var(--error)">⚠️ Ошибка загрузки данных. Проверьте авторизацию.</td></tr>';
            });
    });

    function updateStatus(id, newStatus) {
        const statusRu = newStatus === 'Approved' ? 'Одобрено' : 'Отклонено';
        if (!confirm(`Изменить статус на "${statusRu}"?`)) return;
        
        fetch('/api/admin/update-status', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ id, status: newStatus })
        })
        .then(res => res.json())
        .then(() => location.reload())
        .catch(err => {
            console.error(err);
            alert('Ошибка обновления статуса');
        });
    }
    </script>
</body>
</html>
